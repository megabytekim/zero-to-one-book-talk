<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="피터 틸의 제로 투 원을 함께 읽고 나누는 간단한 발제문">
  <title>제로 투 원 | 간단 발제문</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #171717;
      --muted: #6b6b68;
      --line: #d9d9d4;
      --accent: #b42318;
      --paper: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--paper);
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      font-size: 18px;
      line-height: 1.9;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .page {
      width: min(100% - 48px, 720px);
      margin: 0 auto;
      padding: 72px 0 80px;
    }

    header {
      padding-bottom: 40px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", "Noto Serif KR", serif;
      font-size: clamp(42px, 8vw, 68px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .book {
      display: block;
      width: 124px;
      height: auto;
      margin-top: 28px;
      border: 1px solid var(--line);
    }

    article {
      padding-top: 46px;
    }

    article p {
      margin: 0;
      max-width: 36em;
      text-wrap: pretty;
    }

    article p + p {
      margin-top: 34px;
    }

    article p:nth-last-child(-n + 2) {
      font-family: Georgia, "Times New Roman", "Noto Serif KR", serif;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.65;
    }

    footer {
      margin-top: 64px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    footer p {
      margin: 0;
    }

    @media (max-width: 560px) {
      body {
        font-size: 17px;
        line-height: 1.85;
      }

      .page {
        width: min(100% - 36px, 720px);
        padding: 42px 0 52px;
      }

      header {
        padding-bottom: 32px;
      }

      h1 {
        font-size: 44px;
      }

      .book {
        width: 112px;
        margin-top: 24px;
      }

      article {
        padding-top: 36px;
      }

      article p + p {
        margin-top: 28px;
      }

      article p:nth-last-child(-n + 2) {
        font-size: 22px;
      }

      footer {
        margin-top: 48px;
      }
    }

    @media print {
      @page {
        margin: 18mm;
      }

      body {
        font-size: 12pt;
      }

      .page {
        width: 100%;
        padding: 0;
      }

      .book {
        width: 28mm;
      }

      footer {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <p class="eyebrow">Book Talk</p>
      <h1>제로 투 원</h1>
      <img class="book" src="images/youtube-thumbnail.jpg" alt="피터 틸의 제로 투 원 책 표지">
    </header>

    <article aria-label="발제문">
      <p>지난 한 달 동안 잘 지내셨나요? 한 달 동안 AI를 사용한 경험이 있으시다면 공유해주셔도 좋아요.</p>
      <p>이번 책은 어떠셨나요? 공감이 갔거나, 공감하지 않았던 부분이 있으신가요?</p>
      <p>0에서 1, 1에서 N에 대하여</p>
      <p>대부분의 사람들이 믿지만, 나는 동의하지 않는 사실에 대하여</p>
    </article>

    <footer>
      <p>ZERO TO ONE · PETER THIEL</p>
    </footer>
  </main>
</body>
</html>
